name: Telegram Release Notify
description: Send release notification to Telegram with changelog

inputs:
  bot_token:
    description: Telegram bot token
    required: true
  chat_id:
    description: Telegram chat ID
    required: true
  status:
    description: "Deploy status: success or failure"
    required: false
    default: success
  message:
    description: Custom message (overrides default format)
    required: false
  changelog:
    description: "Changelog text. If empty, auto-generated from commits between previous and current tag"
    required: false

runs:
  using: composite
  steps:
    - name: Send Telegram notification
      shell: bash
      env:
        BOT_TOKEN: ${{ inputs.bot_token }}
        CHAT_ID: ${{ inputs.chat_id }}
        STATUS: ${{ inputs.status }}
        CUSTOM_MESSAGE: ${{ inputs.message }}
        CHANGELOG_INPUT: ${{ inputs.changelog }}
        REPO: ${{ github.repository }}
        REF_NAME: ${{ github.ref_name }}
        SHA: ${{ github.sha }}
        ACTOR: ${{ github.actor }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ -n "$CUSTOM_MESSAGE" ]; then
          TEXT="$CUSTOM_MESSAGE"
        else
          if [ "$STATUS" = "success" ]; then
            ICON=$'\xe2\x9c\x85'
          else
            ICON=$'\xe2\x9d\x8c'
          fi

          # changelog
          if [ -n "$CHANGELOG_INPUT" ]; then
            CHANGELOG="$CHANGELOG_INPUT"
          else
            # auto-generate from git log between previous tag and current
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${REF_NAME}$" | head -1 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log "${PREV_TAG}..${REF_NAME}" --pretty=format:"- %s" --no-merges 2>/dev/null || true)
            else
              CHANGELOG=$(git log "${REF_NAME}" --pretty=format:"- %s" --no-merges -20 2>/dev/null || true)
            fi
          fi

          SHORT_SHA="${SHA:0:7}"
          REPO_NAME="${REPO#*/}"

          TEXT="${ICON} <b>${REPO_NAME}</b> <code>${REF_NAME}</code>"
          TEXT+=$'\n\n'

          if [ -n "$CHANGELOG" ]; then
            TEXT+="<b>Changelog:</b>"
            TEXT+=$'\n'
            TEXT+="${CHANGELOG}"
            TEXT+=$'\n\n'
          fi

          TEXT+="Commit: <code>${SHORT_SHA}</code>"
          TEXT+=$'\n'
          TEXT+="Author: ${ACTOR}"
          TEXT+=$'\n'
          TEXT+="Status: ${STATUS}"
          TEXT+=$'\n\n'
          TEXT+="<a href=\"${RUN_URL}\">View run</a>"
        fi

        curl -sf -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -d chat_id="$CHAT_ID" \
          -d parse_mode=HTML \
          -d disable_web_page_preview=true \
          --data-urlencode "text=$TEXT"
