name: Telegram Notify
description: Universal Telegram notifications for CI/CD pipelines

inputs:
  bot_token:
    description: Telegram bot token
    required: true
  chat_id:
    description: Telegram chat ID
    required: true
  status:
    description: "Status: success or failure"
    required: false
    default: success
  project:
    description: "Project name for header (default: repo name)"
    required: false
  event:
    description: "Event type for header (e.g. CI, K8s tests, deploy)"
    required: false
  branch:
    description: "Branch or tag name (default: github.ref_name)"
    required: false
  body:
    description: "Main message body (HTML). Placed between header and footer"
    required: false
  message:
    description: "Full custom message (overrides template completely)"
    required: false
  changelog:
    description: "Changelog text for deploy notifications"
    required: false

runs:
  using: composite
  steps:
    - name: Send Telegram notification
      shell: bash
      env:
        BOT_TOKEN: ${{ inputs.bot_token }}
        CHAT_ID: ${{ inputs.chat_id }}
        STATUS: ${{ inputs.status }}
        PROJECT: ${{ inputs.project }}
        EVENT: ${{ inputs.event }}
        BRANCH: ${{ inputs.branch }}
        BODY: ${{ inputs.body }}
        CUSTOM_MESSAGE: ${{ inputs.message }}
        CHANGELOG: ${{ inputs.changelog }}
        REPO: ${{ github.repository }}
        REF_NAME: ${{ github.ref_name }}
        ACTOR: ${{ github.actor }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # Full override - backward compat
        if [ -n "$CUSTOM_MESSAGE" ]; then
          TEXT="$CUSTOM_MESSAGE"
        else
          # Icon from status
          if [ "$STATUS" = "success" ]; then
            ICON="🟢"
          else
            ICON="🔴"
          fi

          # Defaults from github context
          PROJECT="${PROJECT:-${REPO#*/}}"
          BRANCH="${BRANCH:-$REF_NAME}"

          # Header: icon + project + event
          TEXT="${ICON} <b>${PROJECT}</b>"
          [ -n "$EVENT" ] && TEXT+=" ${EVENT}"
          TEXT+=$'\n'
          TEXT+="📌 <code>${BRANCH}</code> by ${ACTOR}"

          # Trim leading/trailing whitespace from YAML multiline inputs
          BODY="$(echo "$BODY" | awk 'NF{found=1} found' | tac | awk 'NF{found=1} found' | tac)"
          if [ -n "$BODY" ]; then
            TEXT+=$'\n\n'
            TEXT+="${BODY}"
          fi

          CHANGELOG="$(echo "$CHANGELOG" | awk 'NF{found=1} found' | tac | awk 'NF{found=1} found' | tac)"
          if [ -n "$CHANGELOG" ]; then
            TEXT+=$'\n\n'
            TEXT+="<b>Changes:</b>"
            TEXT+=$'\n'
            TEXT+="<code>${CHANGELOG}</code>"
          fi

          # Footer
          TEXT+=$'\n\n'
          TEXT+="🔗 <a href=\"${RUN_URL}\">View logs</a>"
        fi

        curl -sf -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -d chat_id="$CHAT_ID" \
          -d parse_mode=HTML \
          -d disable_web_page_preview=true \
          --data-urlencode "text=$TEXT"
