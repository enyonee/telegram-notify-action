name: Telegram Release Notify
description: Send release notification to Telegram

inputs:
  bot_token:
    description: Telegram bot token
    required: true
  chat_id:
    description: Telegram chat ID
    required: true
  status:
    description: "Deploy status: success or failure"
    required: false
    default: success
  message:
    description: Custom message (overrides default format)
    required: false

runs:
  using: composite
  steps:
    - name: Send Telegram notification
      shell: bash
      env:
        BOT_TOKEN: ${{ inputs.bot_token }}
        CHAT_ID: ${{ inputs.chat_id }}
        STATUS: ${{ inputs.status }}
        CUSTOM_MESSAGE: ${{ inputs.message }}
        REPO: ${{ github.repository }}
        REF_NAME: ${{ github.ref_name }}
        SHA: ${{ github.sha }}
        ACTOR: ${{ github.actor }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ -n "$CUSTOM_MESSAGE" ]; then
          TEXT="$CUSTOM_MESSAGE"
        else
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          SHORT_SHA="${SHA:0:7}"
          TEXT="${ICON} <b>${REPO}</b> ${REF_NAME}\n\n"
          TEXT+="Commit: <code>${SHORT_SHA}</code>\n"
          TEXT+="Author: ${ACTOR}\n"
          TEXT+="Status: ${STATUS}\n\n"
          TEXT+="<a href=\"${RUN_URL}\">View run</a>"
        fi

        curl -sf -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -d chat_id="$CHAT_ID" \
          -d parse_mode=HTML \
          -d disable_web_page_preview=true \
          --data-urlencode "text=$TEXT"
